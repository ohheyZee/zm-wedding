<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Locked In!</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --cream: #faf7f2;
    --blush: #e8d5c4;
    --rose: #c9a89a;
    --deep: #2c1810;
    --sage: #8a9e8c;
    --gold: #c8a96e;
    --muted: #9b8b80;
    --card: #ffffff;
    --border: #ede5dc;
    --red-soft: #e8a097;
    --green-soft: #8fba8f;
    --amber-soft: #d4a862;
    --blue-soft: #7fa8c9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--deep);
    min-height: 100vh;
  }

  /* HERO HEADER */
  .hero {
    background: var(--deep);
    padding: 48px 32px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border-top: 3px solid transparent;
    border-image: linear-gradient(90deg, transparent, var(--gold), transparent) 1;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,169,110,0.22) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(200,169,110,0.12);
    animation: floatDot 6s ease-in-out infinite;
  }
  .hero-dot:nth-child(1) { width:120px;height:120px;top:-30px;left:8%;animation-delay:0s; }
  .hero-dot:nth-child(2) { width:70px;height:70px;top:20px;right:12%;animation-delay:1.5s; }
  .hero-dot:nth-child(3) { width:50px;height:50px;bottom:10px;left:20%;animation-delay:3s; }
  @keyframes floatDot {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,0.7);
    margin-bottom: 16px;
    position: relative;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.1s;
  }
  .hero-title {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(58px, 10vw, 100px);
    font-weight: 700;
    background: linear-gradient(135deg, #e8c97a 0%, #c8a96e 40%, #f0dfa0 70%, #c8a96e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.05;
    letter-spacing: 1px;
    position: relative;
    animation: fadeUp 0.7s ease both;
    animation-delay: 0.25s;
  }
  .hero-flourish {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 14px 0 10px;
    position: relative;
    animation: fadeUp 0.7s ease both;
    animation-delay: 0.35s;
  }
  .hero-flourish-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(200,169,110,0.5));
  }
  .hero-flourish-line:last-child {
    background: linear-gradient(90deg, rgba(200,169,110,0.5), transparent);
  }
  .hero-flourish-diamond {
    width: 7px;
    height: 7px;
    background: var(--gold);
    transform: rotate(45deg);
    opacity: 0.8;
  }
  .hero-date {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    color: var(--blush);
    margin-top: 2px;
    position: relative;
    animation: fadeUp 0.7s ease both;
    animation-delay: 0.45s;
  }
  .countdown-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
    position: relative;
    animation: fadeUp 0.7s ease both;
    animation-delay: 0.55s;
  }
  .countdown-num {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(200,169,110,0.3);
    border-radius: 12px;
    padding: 14px 36px;
    text-align: center;
  }
  .countdown-num .n {
    font-family: 'Cormorant Garamond', serif;
    font-size: 52px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    display: block;
  }
  .countdown-num .l {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
    display: block;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* NAV TABS */
  .nav-wrap {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .tab-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 18px 24px;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--deep); }
  .tab-btn.active {
    color: var(--deep);
    border-bottom-color: var(--gold);
  }

  /* CONTENT */
  .content { padding: 36px 32px; max-width: 1200px; margin: 0 auto; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* OVERVIEW STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--deep);
    line-height: 1;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SECTION CARD */
  .section-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    background: #fdfaf7;
  }
  .section-title-wrap { display: flex; align-items: center; gap: 10px; }
  .section-title-input {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--deep);
    border: none;
    background: transparent;
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  .section-title-input:hover, .section-title-input:focus {
    border-bottom-color: var(--gold);
  }
  .section-count {
    font-size: 11px;
    background: var(--blush);
    color: var(--deep);
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }
  .section-actions { display: flex; gap: 8px; align-items: center; }

  /* BUTTONS */
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-gold:hover { background: #b8943d; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--cream); color: var(--deep); }
  .btn-danger {
    background: transparent;
    color: #c07070;
    border: 1px solid #e5c5c5;
    font-size: 11px;
    padding: 6px 12px;
  }
  .btn-danger:hover { background: #fdf0f0; }
  .btn-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    font-size: 16px;
    line-height: 1;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .btn-icon:hover { background: #fde8e8; color: #c07070; }

  /* VENDOR TABLE */
  .vendor-table { width: 100%; border-collapse: collapse; }
  .vendor-table th {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    background: #fdfaf7;
    border-bottom: 1px solid var(--border);
  }
  .vendor-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 14px;
  }
  .vendor-table tr:last-child td { border-bottom: none; }
  .vendor-table tr:hover td { background: #fdfaf7; }
  .editable-cell {
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--deep);
    width: 100%;
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: border-color 0.2s;
    padding: 2px 0;
  }
  .editable-cell:hover, .editable-cell:focus { border-bottom-color: var(--gold); }
  .pill {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
  }
  .pill:hover { opacity: 0.8; transform: scale(0.97); }
  .pill-red    { background: #fde8e8; color: #c07070; }
  .pill-green  { background: #e6f4e6; color: #4a8f4a; }
  .pill-amber  { background: #fef3e2; color: #b07d2a; }
  .pill-grey   { background: #f0ece8; color: var(--muted); }
  .pill-blue   { background: #e6f0f8; color: #3a7aaa; }
  .pill-rose   { background: #fdeaea; color: #b05a5a; }

  /* ADD ROW */
  .add-row td { background: #fdfaf7; }
  .add-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--deep);
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-input:focus { border-color: var(--gold); }

  /* GUEST TABLE */
  .guest-table { width: 100%; border-collapse: collapse; }
  .guest-table th {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px;
    text-align: left;
    background: #fdfaf7;
    border-bottom: 1px solid var(--border);
  }
  .guest-table td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    font-size: 14px;
  }
  .guest-table tr:last-child td { border-bottom: none; }
  .guest-table tr:hover td { background: #fdfaf7; }

  /* RSVP SUMMARY */
  .rsvp-summary {
    background: var(--deep);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 24px;
  }
  .rsvp-stat { text-align: center; }
  .rsvp-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 46px;
    font-weight: 300;
    color: var(--gold);
    line-height: 1;
    display: block;
  }
  .rsvp-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--blush);
    margin-top: 4px;
    display: block;
  }
  .rsvp-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 4px;
    margin-top: 12px;
    overflow: hidden;
  }
  .rsvp-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* CHECKLIST */
  .checklist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .checklist-item:last-of-type { border-bottom: none; }
  .checklist-item:hover { background: #fdfaf7; }
  .check-box {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    background: transparent;
  }
  .check-box.checked { background: var(--sage); border-color: var(--sage); }
  .check-box.checked::after {
    content: '';
    width: 5px; height: 9px;
    border: 2px solid white;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
    display: block;
  }
  .check-label {
    flex: 1;
    font-size: 14px;
    cursor: text;
    outline: none;
    border-bottom: 1px dashed transparent;
    transition: all 0.2s;
    min-width: 80px;
  }
  .check-label:hover, .check-label:focus { border-bottom-color: var(--gold); }
  .check-label.done { text-decoration: line-through; color: var(--muted); }
  .progress-bar-wrap {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin: 0 20px 16px;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--muted);
    padding: 8px 20px 4px;
    display: flex;
    justify-content: space-between;
  }

  /* ADD CHECKLIST */
  .checklist-add {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: #fdfaf7;
  }

  /* ADD VENDOR CATEGORY */
  .add-category-row {
    display: flex;
    gap: 10px;
    padding: 16px;
    background: #fdfaf7;
    border-top: 1px solid var(--border);
    border-radius: 0 0 16px 16px;
  }

  /* OVERVIEW PILLS ROW */
  .overview-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 32px;
    align-items: center;
  }
  .overview-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
  }
  .overview-pill strong { color: var(--deep); font-weight: 500; }

  /* MOBILE */
  @media(max-width: 640px) {
    .content { padding: 20px 16px; }
    .nav-wrap { padding: 0 16px; }
    .tab-btn { padding: 14px 14px; font-size: 11px; }
    .hero { padding: 36px 20px 30px; }
    .rsvp-summary { padding: 20px; gap: 16px; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-dot"></div>
  <div class="hero-dot"></div>
  <div class="hero-dot"></div>

  <div class="hero-eyebrow">Z &amp; M's Wedding Dashboard</div>
  <div class="hero-title">Locked In!</div>

  <div class="hero-flourish">
    <div class="hero-flourish-line"></div>
    <div class="hero-flourish-diamond"></div>
    <div class="hero-flourish-line"></div>
  </div>

  <div class="hero-date">Friday, July 31st, 2026</div>

  <div class="countdown-strip">
    <div class="countdown-num">
      <span class="n" id="cd-days">--</span>
      <span class="l">Days</span>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav-wrap">
  <button class="tab-btn active" onclick="switchTab('overview', this)">Overview</button>
  <button class="tab-btn" onclick="switchTab('vendors', this)">Vendors</button>
  <button class="tab-btn" onclick="switchTab('guests', this)">Guest List</button>
  <button class="tab-btn" onclick="switchTab('checklist', this)">Checklist</button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- OVERVIEW TAB -->
  <div class="tab-panel active" id="tab-overview">
    <div class="stats-grid" id="overview-stats"></div>
    <div class="overview-meta" id="overview-meta"></div>
  </div>

  <!-- VENDORS TAB -->
  <div class="tab-panel" id="tab-vendors">
    <div id="vendor-sections"></div>
    <div class="add-category-row" style="border-radius:16px;border:1px solid var(--border);">
      <input class="add-input" id="new-cat-name" placeholder="New vendor category name..." style="flex:1"/>
      <button class="btn btn-gold" onclick="addVendorCategory()">+ Add Category</button>
    </div>
  </div>

  <!-- GUESTS TAB -->
  <div class="tab-panel" id="tab-guests">
    <div class="rsvp-summary" id="rsvp-summary"></div>
    <div id="guest-sections"></div>
  </div>

  <!-- CHECKLIST TAB -->
  <div class="tab-panel" id="tab-checklist">
    <div id="checklist-sections"></div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// COUNTDOWN
// ─────────────────────────────────────────────
function updateCountdown() {
  const wedding = new Date('2026-07-31T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  const diff = Math.ceil((wedding - now) / (1000*60*60*24));
  document.getElementById('cd-days').textContent = diff > 0 ? diff : 0;
}
updateCountdown();
setInterval(updateCountdown, 60000);

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let vendorData = [
  {
    id: 1, title: 'Venue',
    items: [
      { id: 1, name: 'Nikkah Venue', booked: 'booked', deposit: 'paid', link: '' },
      { id: 2, name: 'Reception Venue', booked: 'not booked', deposit: 'none', link: '' },
    ]
  },
  {

    items: [

      { id: 2, name: 'Videographer', booked: 'not booked', deposit: 'none', link: '' },
    ]
  },
  {
    id: 3, title: 'Catering',
    items: [
      { id: 1, name: 'Caterer', booked: 'not booked', deposit: 'none', link: '' },
      { id: 2, name: 'Cake / Desserts', booked: 'not booked', deposit: 'none', link: '' },
    ]
  },
  {
    id: 4, title: 'Beauty',
    items: [
      { id: 1, name: 'Hair Stylist', booked: 'not booked', deposit: 'none', link: '' },
      { id: 2, name: 'Makeup Artist', booked: 'not booked', deposit: 'none', link: '' },
    ]
  },
  {
    id: 5, title: 'Music & Entertainment',
    items: [
      { id: 1, name: 'DJ', booked: 'not booked', deposit: 'none', link: '' },
    ]
  },
  {
    id: 6, title: 'Floral & Decor',
    items: [
      { id: 1, name: 'Florist', booked: 'not booked', deposit: 'none', link: '' },
      { id: 2, name: 'Decor Rental', booked: 'not booked', deposit: 'none', link: '' },
    ]
  },
];

let guestData = [
  { id: 1, title: "Bride's Family", items: [] },
  { id: 2, title: "Groom's Family", items: [] },
  { id: 3, title: "Bride's Guest", items: [] },
  { id: 4, title: "Groom's Guest", items: [] },
];

let checklistData = [
  {
    id: 1, title: 'Overall Checklist',
    items: [
      { id: 1, text: 'Set a budget', done: false },
      { id: 2, text: 'Book ceremony venue', done: false },
      { id: 3, text: 'Book reception venue', done: false },
      { id: 4, text: 'Send save the dates', done: false },
      { id: 5, text: 'Book photographer', done: false },
      { id: 6, text: 'Book videographer', done: false },
      { id: 7, text: 'Choose wedding dress', done: false },
      { id: 8, text: 'Book caterer', done: false },
      { id: 9, text: 'Finalize guest list', done: false },
      { id: 10, text: 'Send invitations', done: false },
    ]
  },
  {
    id: 2, title: 'Day-of Checklist',
    items: [
      { id: 1, text: 'Confirm all vendors', done: false },
      { id: 2, text: 'Bridal party hair & makeup', done: false },
      { id: 3, text: 'Bride gets ready', done: false },
      { id: 4, text: 'First look / photos', done: false },
      { id: 5, text: 'Nikkah ceremony', done: false },
      { id: 6, text: 'Cocktail hour', done: false },
      { id: 7, text: 'Reception entrance', done: false },
      { id: 8, text: 'First dance', done: false },
      { id: 9, text: 'Dinner & speeches', done: false },
      { id: 10, text: 'Cake cutting', done: false },
    ]
  }
];

let _vcatId = 10, _vitId = 100, _gcatId = 10, _gitId = 100, _clitId = 100;

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function guestStats() {
  let invited = 0, confirmed = 0, declined = 0, awaiting = 0;
  guestData.forEach(cat => cat.items.forEach(g => {
    invited++;
    if (g.rsvp === 'confirmed') confirmed++;
    else if (g.rsvp === 'declined') declined++;
    else awaiting++;
  }));
  return { invited, confirmed, declined, awaiting, remaining: Math.max(0, 300 - invited) };
}

function vendorStats() {
  let total = 0, booked = 0;
  vendorData.forEach(c => c.items.forEach(v => {
    total++;
    if (v.booked === 'booked') booked++;
  }));
  return { total, booked };
}

function checklistStats() {
  let total = 0, done = 0;
  checklistData.forEach(c => c.items.forEach(i => {
    total++;
    if (i.done) done++;
  }));
  return { total, done };
}

// ─────────────────────────────────────────────
// OVERVIEW
// ─────────────────────────────────────────────
function renderOverview() {
  const gs = guestStats();
  const vs = vendorStats();
  const cs = checklistStats();
  const wedding = new Date('2026-07-31T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const days = Math.ceil((wedding - now) / (1000*60*60*24));
  const weeks = Math.floor(days / 7);

  document.getElementById('overview-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Days Away</div>
      <div class="stat-value">${days}</div>
      <div class="stat-sub">${weeks} weeks to go</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Guests Invited</div>
      <div class="stat-value">${gs.invited}<span style="font-size:20px;color:var(--muted)">/300</span></div>
      <div class="stat-sub">${gs.remaining} spots remaining</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vendors Booked</div>
      <div class="stat-value">${vs.booked}<span style="font-size:20px;color:var(--muted)">/${vs.total}</span></div>
      <div class="stat-sub">${vs.total - vs.booked} still needed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tasks Complete</div>
      <div class="stat-value">${cs.done}<span style="font-size:20px;color:var(--muted)">/${cs.total}</span></div>
      <div class="stat-sub">${Math.round(cs.done/cs.total*100)||0}% done</div>
    </div>
  `;

  document.getElementById('overview-meta').innerHTML = `
    <div class="overview-pill"><strong>Confirmed RSVPs:</strong> ${gs.confirmed}</div>
    <div class="overview-pill"><strong>Declined:</strong> ${gs.declined}</div>
    <div class="overview-pill"><strong>Awaiting:</strong> ${gs.awaiting}</div>
    <div class="overview-pill"><strong>Spots Left:</strong> ${gs.remaining}</div>
  `;
}

// ─────────────────────────────────────────────
// VENDORS
// ─────────────────────────────────────────────
function bookedPill(status) {
  if (status === 'booked') return `<span class="pill pill-green">Booked</span>`;
  return `<span class="pill pill-red">Not Booked</span>`;
}
function depositPill(status) {
  if (status === 'paid') return `<span class="pill pill-green">Paid</span>`;
  if (status === 'pending') return `<span class="pill pill-amber">Pending</span>`;
  return `<span class="pill pill-grey">No Deposit</span>`;
}
function cycleBooked(catId, itemId) {
  const cat = vendorData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  item.booked = item.booked === 'booked' ? 'not booked' : 'booked';
  renderAll();
}
function cycleDeposit(catId, itemId) {
  const cat = vendorData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  const seq = ['none','pending','paid'];
  item.deposit = seq[(seq.indexOf(item.deposit)+1)%3];
  renderAll();
}
function updateVendorField(catId, itemId, field, val) {
  const cat = vendorData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  item[field] = val;
  renderOverview();
}
function deleteVendorItem(catId, itemId) {
  const cat = vendorData.find(c=>c.id===catId);
  cat.items = cat.items.filter(i=>i.id!==itemId);
  renderAll();
}
function addVendorItem(catId) {
  const cat = vendorData.find(c=>c.id===catId);
  const nameEl = document.getElementById(`add-vendor-name-${catId}`);
  const name = nameEl.value.trim();
  if (!name) return;
  cat.items.push({ id: ++_vitId, name, booked: 'not booked', deposit: 'none', link: '' });
  renderAll();
}
function deleteVendorCategory(catId) {
  if (!confirm('Delete this category and all its vendors?')) return;
  vendorData = vendorData.filter(c=>c.id!==catId);
  renderAll();
}
function updateCategoryTitle(catId, val, type) {
  if (type === 'vendor') vendorData.find(c=>c.id===catId).title = val;
  else if (type === 'guest') guestData.find(c=>c.id===catId).title = val;
  else if (type === 'checklist') checklistData.find(c=>c.id===catId).title = val;
  renderOverview();
}
function addVendorCategory() {
  const nameEl = document.getElementById('new-cat-name');
  const name = nameEl.value.trim();
  if (!name) return;
  vendorData.push({ id: ++_vcatId, title: name, items: [] });
  nameEl.value = '';
  renderAll();
}
function openVendorLink(url) {
  if (url && (url.startsWith('http'))) window.open(url, '_blank');
}

function renderVendors() {
  let html = '';
  vendorData.forEach(cat => {
    html += `
    <div class="section-card" style="margin-bottom:24px;">
      <div class="section-header">
        <div class="section-title-wrap">
          <input class="section-title-input" value="${esc(cat.title)}" onchange="updateCategoryTitle(${cat.id},this.value,'vendor')" title="Click to rename"/>
          <span class="section-count">${cat.items.length}</span>
        </div>
        <div class="section-actions">
          <button class="btn btn-danger" onclick="deleteVendorCategory(${cat.id})">Delete Category</button>
        </div>
      </div>
      <table class="vendor-table">
        <thead><tr>
          <th style="width:32%">Vendor</th>
          <th style="width:15%">Booked</th>
          <th style="width:15%">Deposit</th>
          <th>Link</th>
          <th style="width:40px"></th>
        </tr></thead>
        <tbody>
    `;
    cat.items.forEach(item => {
      html += `<tr>
        <td><input class="editable-cell" value="${esc(item.name)}" onchange="updateVendorField(${cat.id},${item.id},'name',this.value)" placeholder="Vendor name"/></td>
        <td><span onclick="cycleBooked(${cat.id},${item.id})">${bookedPill(item.booked)}</span></td>
        <td><span onclick="cycleDeposit(${cat.id},${item.id})">${depositPill(item.deposit)}</span></td>
        <td>
          <input class="editable-cell" value="${esc(item.link)}" placeholder="https://..."
            onchange="updateVendorField(${cat.id},${item.id},'link',this.value)"
            ondblclick="openVendorLink(this.value)"
            title="Double-click to open link"/>
        </td>
        <td><button class="btn-icon" onclick="deleteVendorItem(${cat.id},${item.id})" title="Delete">&#215;</button></td>
      </tr>`;
    });
    html += `
        <tr class="add-row">
          <td><input class="add-input" id="add-vendor-name-${cat.id}" placeholder="New vendor name..." onkeydown="if(event.key==='Enter')addVendorItem(${cat.id})"/></td>
          <td colspan="3" style="color:var(--muted);font-size:12px;">Press Enter or click Add</td>
          <td><button class="btn btn-gold" onclick="addVendorItem(${cat.id})" style="padding:7px 12px;">+</button></td>
        </tr>
        </tbody>
      </table>
    </div>`;
  });
  document.getElementById('vendor-sections').innerHTML = html;
}

// ─────────────────────────────────────────────
// GUESTS
// ─────────────────────────────────────────────
function rsvpPill(status) {
  if (status === 'confirmed') return `<span class="pill pill-green">Confirmed</span>`;
  if (status === 'declined') return `<span class="pill pill-rose">Declined</span>`;
  return `<span class="pill pill-grey">Awaiting</span>`;
}
function eventPill(status) {
  if (status === 'nikkah') return `<span class="pill pill-amber">Nikkah</span>`;
  if (status === 'reception') return `<span class="pill pill-blue">Reception</span>`;
  return `<span class="pill pill-green">Both</span>`;
}
function cycleRsvp(catId, itemId) {
  const cat = guestData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  const seq = ['awaiting','confirmed','declined'];
  item.rsvp = seq[(seq.indexOf(item.rsvp||'awaiting')+1)%3];
  renderAll();
}
function cycleEvent(catId, itemId) {
  const cat = guestData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  const seq = ['both','nikkah','reception'];
  item.event = seq[(seq.indexOf(item.event||'both')+1)%3];
  renderAll();
}
function updateGuestField(catId, itemId, field, val) {
  const cat = guestData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  item[field] = val;
  renderOverview();
}
function deleteGuest(catId, itemId) {
  const cat = guestData.find(c=>c.id===catId);
  cat.items = cat.items.filter(i=>i.id!==itemId);
  renderAll();
}
function addGuest(catId) {
  const cat = guestData.find(c=>c.id===catId);
  const fnEl = document.getElementById(`add-guest-fn-${catId}`);
  const lnEl = document.getElementById(`add-guest-ln-${catId}`);
  const fn = fnEl.value.trim(), ln = lnEl.value.trim();
  if (!fn && !ln) return;
  cat.items.push({ id: ++_gitId, firstName: fn, lastName: ln, rsvp: 'awaiting', event: 'both' });
  fnEl.value = ''; lnEl.value = '';
  renderAll();
}

function renderRsvpSummary() {
  const gs = guestStats();
  const pct = Math.min(100, Math.round(gs.invited/300*100));
  document.getElementById('rsvp-summary').innerHTML = `
    <div class="rsvp-stat">
      <span class="rsvp-num">${gs.invited}</span>
      <span class="rsvp-label">Guests Invited</span>
      <div class="rsvp-bar-wrap"><div class="rsvp-bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="rsvp-stat">
      <span class="rsvp-num">${gs.confirmed}</span>
      <span class="rsvp-label">Confirmed</span>
    </div>
    <div class="rsvp-stat">
      <span class="rsvp-num">${gs.declined}</span>
      <span class="rsvp-label">Declined</span>
    </div>
    <div class="rsvp-stat">
      <span class="rsvp-num">${gs.remaining}</span>
      <span class="rsvp-label">Spots Remaining</span>
    </div>
  `;
}

function renderGuests() {
  renderRsvpSummary();
  let html = '';
  guestData.forEach(cat => {
    html += `
    <div class="section-card" style="margin-bottom:24px;">
      <div class="section-header">
        <div class="section-title-wrap">
          <input class="section-title-input" value="${esc(cat.title)}" onchange="updateCategoryTitle(${cat.id},this.value,'guest')" title="Click to rename"/>
          <span class="section-count">${cat.items.length}</span>
        </div>
      </div>
      <table class="guest-table">
        <thead><tr>
          <th style="width:28%">First Name</th>
          <th style="width:28%">Last Name</th>
          <th style="width:18%">Event</th>
          <th style="width:18%">RSVP</th>
          <th style="width:40px"></th>
        </tr></thead>
        <tbody>
    `;
    cat.items.forEach(item => {
      html += `<tr>
        <td><input class="editable-cell" value="${esc(item.firstName||'')}" onchange="updateGuestField(${cat.id},${item.id},'firstName',this.value)" placeholder="First name"/></td>
        <td><input class="editable-cell" value="${esc(item.lastName||'')}" onchange="updateGuestField(${cat.id},${item.id},'lastName',this.value)" placeholder="Last name"/></td>
        <td><span onclick="cycleEvent(${cat.id},${item.id})" style="cursor:pointer">${eventPill(item.event||'both')}</span></td>
        <td><span onclick="cycleRsvp(${cat.id},${item.id})" style="cursor:pointer">${rsvpPill(item.rsvp||'awaiting')}</span></td>
        <td><button class="btn-icon" onclick="deleteGuest(${cat.id},${item.id})" title="Delete">&#215;</button></td>
      </tr>`;
    });
    html += `
        <tr class="add-row">
          <td><input class="add-input" id="add-guest-fn-${cat.id}" placeholder="First name..." onkeydown="if(event.key==='Enter')document.getElementById('add-guest-ln-${cat.id}').focus()"/></td>
          <td><input class="add-input" id="add-guest-ln-${cat.id}" placeholder="Last name..." onkeydown="if(event.key==='Enter')addGuest(${cat.id})"/></td>
          <td colspan="2" style="color:var(--muted);font-size:12px;">Enter to add</td>
          <td><button class="btn btn-gold" onclick="addGuest(${cat.id})" style="padding:7px 12px;">+</button></td>
        </tr>
        </tbody>
      </table>
    </div>`;
  });
  document.getElementById('guest-sections').innerHTML = html;
}

// ─────────────────────────────────────────────
// CHECKLIST
// ─────────────────────────────────────────────
function toggleCheck(catId, itemId) {
  const cat = checklistData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  item.done = !item.done;
  renderAll();
}
function updateCheckText(catId, itemId, val) {
  const cat = checklistData.find(c=>c.id===catId);
  const item = cat.items.find(i=>i.id===itemId);
  item.text = val;
}
function deleteCheckItem(catId, itemId) {
  const cat = checklistData.find(c=>c.id===catId);
  cat.items = cat.items.filter(i=>i.id!==itemId);
  renderAll();
}
function addCheckItem(catId) {
  const cat = checklistData.find(c=>c.id===catId);
  const el = document.getElementById(`add-check-${catId}`);
  const text = el.value.trim();
  if (!text) return;
  cat.items.push({ id: ++_clitId, text, done: false });
  el.value = '';
  renderAll();
}

function renderChecklist() {
  let html = '';
  checklistData.forEach(cat => {
    const done = cat.items.filter(i=>i.done).length;
    const total = cat.items.length;
    const pct = total ? Math.round(done/total*100) : 0;
    html += `
    <div class="section-card" style="margin-bottom:24px;">
      <div class="section-header">
        <div class="section-title-wrap">
          <input class="section-title-input" value="${esc(cat.title)}" onchange="updateCategoryTitle(${cat.id},this.value,'checklist')" title="Click to rename"/>
          <span class="section-count">${done}/${total}</span>
        </div>
      </div>
      <div class="progress-label"><span>${pct}% complete</span><span>${done} of ${total} done</span></div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    `;
    cat.items.forEach(item => {
      html += `
      <div class="checklist-item">
        <div class="check-box ${item.done?'checked':''}" onclick="toggleCheck(${cat.id},${item.id})"></div>
        <span class="check-label ${item.done?'done':''}" contenteditable="true"
          onblur="updateCheckText(${cat.id},${item.id},this.innerText)"
          spellcheck="false">${esc(item.text)}</span>
        <button class="btn-icon" onclick="deleteCheckItem(${cat.id},${item.id})" title="Delete">&#215;</button>
      </div>`;
    });
    html += `
      <div class="checklist-add">
        <input class="add-input" id="add-check-${cat.id}" placeholder="Add new task..." style="flex:1"
          onkeydown="if(event.key==='Enter')addCheckItem(${cat.id})"/>
        <button class="btn btn-gold" onclick="addCheckItem(${cat.id})">+ Add</button>
      </div>
    </div>`;
  });
  document.getElementById('checklist-sections').innerHTML = html;
}

// ─────────────────────────────────────────────
// TABS & RENDER
// ─────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAll() {
  renderOverview();
  renderVendors();
  renderGuests();
  renderChecklist();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

renderAll();
</script>
</body>
</html>
